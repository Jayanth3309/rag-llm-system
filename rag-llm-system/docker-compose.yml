version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - INDEX_DIR=/app/data/index
      - DOCS_DIR=/app/data/docs
      - LLM_BACKEND=local
      - MODEL_PATH=/app/checkpoints/mistral-7b-qlora
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN}
    volumes:
      - ./data:/app/data
      - ./checkpoints:/app/checkpoints
    depends_on:
      - redis
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
